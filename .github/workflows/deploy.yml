name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer merge supersedes an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Push functions/schema to the production Convex deployment first, so
  # the backend validators are live before any frontend that needs them.
  # Requires the CONVEX_DEPLOY_KEY repo secret (Convex dashboard →
  # Settings → Deploy keys → Production).
  convex:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

  deploy:
    runs-on: ubuntu-latest
    needs: convex
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Vite picks up the committed .env.production (VITE_CONVEX_URL) for prod builds.
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
